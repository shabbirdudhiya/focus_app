name: Build Focus App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install MinGW
      run: |
        choco install mingw -y --no-progress
        echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" >> $GITHUB_PATH

    - name: Run Unit Tests
      run: |
        g++ -static -static-libgcc -static-libstdc++ -D_UNICODE -DUNICODE -o tests/test_basic.exe tests/test_basic.cpp
        .\tests\test_basic.exe
        echo "All tests passed!"

  build:
    name: Build Executable
    needs: test
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install MinGW
      run: |
        choco install mingw -y --no-progress
        echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" >> $GITHUB_PATH

    - name: Build Focus App
      run: |
        g++ -static -static-libgcc -static-libstdc++ -D_UNICODE -DUNICODE -o focus_app.exe focus_app_simple.cpp -luser32 -lgdi32 -lcomctl32 -lshell32 -lpsapi

    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: focus_app_exe
        path: focus_app.exe
        retention-days: 30

    - name: Create Release (on main branch)
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: focus_app.exe
        name: Focus App v1.0
        tag_name: v1.0
        body: |
          Lightweight Windows focus app with floating timer and app blocking warnings.
          
          Features:
          - Floating timer window (always on top)
          - Pomodoro timer (25min focus, 5min break)
          - App blocking with warnings
          - Task tracking
          - Configurable durations
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
