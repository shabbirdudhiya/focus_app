name: Build Focus App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install MinGW
      run: |
        choco install mingw -y --no-progress
        echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" >> $GITHUB_PATH

    - name: Compile Tests
      shell: cmd
      run: |
        cd tests
        g++ -static -static-libgcc -static-libstdc++ -D_UNICODE -DUNICODE -o test_basic.exe test_basic.cpp
        cd ..

    - name: Run Unit Tests
      shell: cmd
      run: |
        tests\test_basic.exe
        echo All tests passed!

  build:
    name: Build Executable
    needs: test
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install MinGW
      run: |
        choco install mingw -y --no-progress
        echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" >> $GITHUB_PATH

    - name: Build Focus App (Full Version)
      shell: cmd
      run: |
        g++ -static -static-libgcc -static-libstdc++ -D_UNICODE -DUNICODE -o focus_app.exe focus_app_full.cpp -luser32 -lgdi32 -lcomctl32 -lshell32 -lpsapi

    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: focus_app_exe
        path: focus_app.exe
        retention-days: 30

    - name: Commit executable to repository
      if: github.ref == 'refs/heads/main'
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add focus_app.exe
        git commit -m "Auto-build: Update compiled executable [skip ci]"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
